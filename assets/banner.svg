<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1f29"/>
      <stop offset="100%" stop-color="#282a36"/>
    </linearGradient>
    
    <!-- Neon Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff79c6"/>
      <stop offset="50%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Card Background -->
  <rect width="800" height="200" rx="10" fill="url(#bgGrad)"/>
  
  <!-- Outer glowing border -->
  <rect x="2" y="2" width="796" height="196" rx="8" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity="0.8" filter="url(#neonGlow)"/>

  <!-- Terminal Window Container -->
  <rect x="20" y="20" width="760" height="160" rx="8" fill="#181a23" stroke="#44475a" stroke-width="1"/>
  
  <!-- Terminal Header Bar -->
  <path d="M 20 28 A 8 8 0 0 1 28 20 L 772 20 A 8 8 0 0 1 780 28 L 780 48 L 20 48 Z" fill="#212330"/>
  
  <!-- Window Control Buttons -->
  <circle cx="38" cy="34" r="6" fill="#ff5555"/>
  <circle cx="56" cy="34" r="6" fill="#ffb86c"/>
  <circle cx="74" cy="34" r="6" fill="#50fa7b"/>
  
  <!-- Terminal Header Title -->
  <text x="400" y="39" fill="#6272a4" font-family="'Segoe UI', Roboto, Monaco, Consolas, monospace" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="1">mathewkenyi07 @ University-of-Kigali</text>

  <!-- Left Side: Terminal CLI -->
  <text x="45" y="80" fill="#50fa7b" font-family="Monaco, Consolas, 'Fira Code', monospace" font-size="14" font-weight="bold">$ whoami</text>
  <text x="45" y="108" fill="#f8f8f2" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" letter-spacing="0.5">Mathew Kenyi Isaac</text>
  <text x="45" y="132" fill="#ff79c6" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" letter-spacing="0.5">Software Engineer • Techpreneur • Content Creator</text>
  <text x="45" y="160" fill="#8be9fd" font-family="Monaco, Consolas, 'Fira Code', monospace" font-size="12">$ echo $IMPACT</text>
  <text x="165" y="160" fill="#f8f8f2" font-family="Monaco, Consolas, 'Fira Code', monospace" font-size="12">"building solutions that scale"</text>

  <!-- Right Side: profile.json widget -->
  <!-- Subtle divider -->
  <line x1="500" y1="48" x2="500" y2="180" stroke="#44475a" stroke-width="1" stroke-dasharray="4 4"/>
  
  <!-- Code Editor Widget -->
  <text x="525" y="75" fill="#6272a4" font-family="Monaco, Consolas, 'Fira Code', monospace" font-size="12">{</text>
  <text x="525" y="95" fill="#ff79c6" font-family="Monaco, Consolas, 'Fira Code', monospace" font-size="12"><tspan fill="#f8f8f2">  "role":</tspan> "fullstack-dev"<tspan fill="#f8f8f2">,</tspan></text>
  <text x="525" y="115" fill="#ff79c6" font-family="Monaco, Consolas, 'Fira Code', monospace" font-size="12"><tspan fill="#f8f8f2">  "stack":</tspan> ["react", "nodejs", "c"]<tspan fill="#f8f8f2">,</tspan></text>
  <text x="525" y="135" fill="#ff79c6" font-family="Monaco, Consolas, 'Fira Code', monospace" font-size="12"><tspan fill="#f8f8f2">  "hobbies":</tspan> ["music", "coding"]<tspan fill="#f8f8f2">,</tspan></text>
  <text x="525" y="155" fill="#50fa7b" font-family="Monaco, Consolas, 'Fira Code', monospace" font-size="12"><tspan fill="#f8f8f2">  "coffee_level":</tspan> "overflowing"</text>
  <text x="525" y="170" fill="#6272a4" font-family="Monaco, Consolas, 'Fira Code', monospace" font-size="12">}</text>
</svg>
