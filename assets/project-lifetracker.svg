<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1f29"/>
      <stop offset="100%" stop-color="#282a36"/>
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Card Background -->
  <rect width="800" height="180" rx="10" fill="url(#bgGrad)"/>
  
  <!-- Outer glowing border (Neon Pink Theme) -->
  <rect x="2" y="2" width="796" height="176" rx="8" fill="none" stroke="#ff79c6" stroke-width="1.5" opacity="0.8" filter="url(#neonGlow)"/>

  <!-- Inner Content Window -->
  <rect x="15" y="15" width="770" height="150" rx="8" fill="#181a23" stroke="#44475a" stroke-width="1"/>
  
  <!-- Left Side: Icon Container -->
  <g transform="translate(35, 40)">
    <!-- Glowing Outer Circle -->
    <circle cx="45" cy="45" r="40" fill="none" stroke="#ff79c6" stroke-width="2" filter="url(#neonGlow)" opacity="0.7"/>
    <!-- Inner Icon Circle -->
    <circle cx="45" cy="45" r="35" fill="#282a36" stroke="#44475a" stroke-width="1.5"/>
    <!-- Calendar/Checklist Icon -->
    <rect x="33" y="31" width="24" height="28" rx="2" fill="none" stroke="#ff79c6" stroke-width="3" filter="url(#neonGlow)"/>
    <line x1="38" y1="28" x2="38" y2="33" stroke="#ff79c6" stroke-width="3" stroke-linecap="round"/>
    <line x1="52" y1="28" x2="52" y2="33" stroke="#ff79c6" stroke-width="3" stroke-linecap="round"/>
    <!-- Checkmark inside -->
    <path d="M 38 45 L 43 50 L 52 40" fill="none" stroke="#f8f8f2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Middle Section: Text Details -->
  <text x="150" y="48" fill="#f8f8f2" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold">Life Tracker App</text>
  <text x="150" y="68" fill="#bd93f9" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" letter-spacing="0.5">PERSONAL PRODUCTIVITY ECOSYSTEM</text>
  
  <text x="150" y="98" fill="#f8f8f2" font-family="'Segoe UI', Roboto, sans-serif" font-size="11.5" opacity="0.9">
    <tspan fill="#ff79c6" font-weight="bold">✔</tspan> Modular Trackers: Organized logging for daily activities, habits, and tasks.
  </text>
  <text x="150" y="118" fill="#f8f8f2" font-family="'Segoe UI', Roboto, sans-serif" font-size="11.5" opacity="0.9">
    <tspan fill="#ff79c6" font-weight="bold">✔</tspan> Budget Ledger: Interactive expense, revenue, and academic cost logs.
  </text>
  <text x="150" y="138" fill="#f8f8f2" font-family="'Segoe UI', Roboto, sans-serif" font-size="11.5" opacity="0.9">
    <tspan fill="#ff79c6" font-weight="bold">✔</tspan> Data Autonomy: Secure client-side state storage utilizing HTML5 Web Storage.
  </text>

  <!-- Right Sidebar: Tech Stack -->
  <line x1="595" y1="15" x2="595" y2="165" stroke="#44475a" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="615" y="42" fill="#6272a4" font-family="Monaco, Consolas, monospace" font-size="10.5" font-weight="bold" letter-spacing="1">PROJECT STACK</text>
  
  <!-- Badges -->
  <!-- Row 1 -->
  <rect x="615" y="55" width="70" height="20" rx="4" fill="#282a36" stroke="#f7df1e" stroke-width="1"/>
  <text x="650" y="69" fill="#f7df1e" font-family="Monaco, Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">JS (ES6)</text>

  <rect x="695" y="55" width="75" height="20" rx="4" fill="#282a36" stroke="#61dafb" stroke-width="1"/>
  <text x="732" y="69" fill="#61dafb" font-family="Monaco, Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">React</text>

  <!-- Row 2 -->
  <rect x="615" y="85" width="155" height="20" rx="4" fill="#282a36" stroke="#ffb86c" stroke-width="1"/>
  <text x="692" y="99" fill="#ffb86c" font-family="Monaco, Consolas, monospace" font-size="9.5" text-anchor="middle" font-weight="bold">LocalStorage</text>

  <!-- Row 3 -->
  <rect x="615" y="115" width="155" height="20" rx="4" fill="#282a36" stroke="#50fa7b" stroke-width="1"/>
  <text x="692" y="129" fill="#50fa7b" font-family="Monaco, Consolas, monospace" font-size="9.5" text-anchor="middle" font-weight="bold">CSS3 &amp; HTML5</text>
</svg>
