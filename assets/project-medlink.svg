<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1f29"/>
      <stop offset="100%" stop-color="#282a36"/>
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Card Background -->
  <rect width="800" height="180" rx="10" fill="url(#bgGrad)"/>
  
  <!-- Outer glowing border (Neon Green Theme) -->
  <rect x="2" y="2" width="796" height="176" rx="8" fill="none" stroke="#50fa7b" stroke-width="1.5" opacity="0.8" filter="url(#neonGlow)"/>

  <!-- Inner Content Window -->
  <rect x="15" y="15" width="770" height="150" rx="8" fill="#181a23" stroke="#44475a" stroke-width="1"/>
  
  <!-- Left Side: Icon Container -->
  <g transform="translate(35, 40)">
    <!-- Glowing Outer Circle -->
    <circle cx="45" cy="45" r="40" fill="none" stroke="#50fa7b" stroke-width="2" filter="url(#neonGlow)" opacity="0.7"/>
    <!-- Inner Icon Circle -->
    <circle cx="45" cy="45" r="35" fill="#282a36" stroke="#44475a" stroke-width="1.5"/>
    <!-- Medical Cross Icon -->
    <path d="M 45 27 L 45 63 M 27 45 L 63 45" stroke="#50fa7b" stroke-width="8" stroke-linecap="round" filter="url(#neonGlow)"/>
    <path d="M 45 27 L 45 63 M 27 45 L 63 45" stroke="#f8f8f2" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Middle Section: Text Details -->
  <text x="150" y="48" fill="#f8f8f2" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold">Medical Link Africa</text>
  <text x="150" y="68" fill="#8be9fd" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" letter-spacing="0.5">HEALTHCARE ACCESSIBILITY PORTAL</text>
  
  <text x="150" y="98" fill="#f8f8f2" font-family="'Segoe UI', Roboto, sans-serif" font-size="11.5" opacity="0.9">
    <tspan fill="#50fa7b" font-weight="bold">✔</tspan> Multilingual Search: Integrated voice and text searches in English, Swahili, and Kinyarwanda.
  </text>
  <text x="150" y="118" fill="#f8f8f2" font-family="'Segoe UI', Roboto, sans-serif" font-size="11.5" opacity="0.9">
    <tspan fill="#50fa7b" font-weight="bold">✔</tspan> Geo-Location Routing: Dynamically maps users to the closest verified pharmacies.
  </text>
  <text x="150" y="138" fill="#f8f8f2" font-family="'Segoe UI', Roboto, sans-serif" font-size="11.5" opacity="0.9">
    <tspan fill="#50fa7b" font-weight="bold">✔</tspan> Stock Verification: Connects users to pharmacies with active pharmaceutical inventories.
  </text>

  <!-- Right Sidebar: Tech Stack -->
  <line x1="595" y1="15" x2="595" y2="165" stroke="#44475a" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="615" y="42" fill="#6272a4" font-family="Monaco, Consolas, monospace" font-size="10.5" font-weight="bold" letter-spacing="1">PROJECT STACK</text>
  
  <!-- Badges -->
  <!-- Row 1 -->
  <rect x="615" y="55" width="70" height="20" rx="4" fill="#282a36" stroke="#61dafb" stroke-width="1"/>
  <text x="650" y="69" fill="#61dafb" font-family="Monaco, Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">React</text>

  <rect x="695" y="55" width="75" height="20" rx="4" fill="#282a36" stroke="#38bdf8" stroke-width="1"/>
  <text x="732" y="69" fill="#38bdf8" font-family="Monaco, Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">Tailwind</text>

  <!-- Row 2 -->
  <rect x="615" y="85" width="70" height="20" rx="4" fill="#282a36" stroke="#339933" stroke-width="1"/>
  <text x="650" y="99" fill="#339933" font-family="Monaco, Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">NodeJS</text>

  <rect x="695" y="85" width="75" height="20" rx="4" fill="#282a36" stroke="#00c7b7" stroke-width="1"/>
  <text x="732" y="99" fill="#00c7b7" font-family="Monaco, Consolas, monospace" font-size="10" text-anchor="middle" font-weight="bold">Netlify</text>

  <!-- Row 3 -->
  <rect x="615" y="115" width="155" height="20" rx="4" fill="#282a36" stroke="#ff79c6" stroke-width="1"/>
  <text x="692" y="129" fill="#ff79c6" font-family="Monaco, Consolas, monospace" font-size="9.5" text-anchor="middle" font-weight="bold">Web Speech API</text>
</svg>
